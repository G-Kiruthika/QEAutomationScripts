# Environment Configuration
environment: "test"

# Browser Configuration
browser: "chrome"
headless: false

# Application URLs
base_url: "https://example.com"
registration_url: "https://example.com/register"
login_url: "https://example.com/login"

# Test Data
test_users:
  valid_user:
    username: "testuser123"
    email: "testuser@example.com"
    password: "SecurePass123!"
  
  invalid_user:
    username: "invaliduser"
    email: "invalid-email"
    password: "weak"

# Timeouts
timeouts:
  implicit_wait: 10
  explicit_wait: 15
  page_load: 30

# Reporting
reporting:
  email_enabled: true
  email_recipients:
    - "qa-team@example.com"
  report_path: "reports/"

# Database (if needed)
database:
  host: "localhost"
  port: 5432
  name: "testdb"
  username: "testuser"
  password: "testpass"